
# name of enviroment for this project
name: mt26
channels:
  - conda-forge

# libraries used in this project
dependencies:
  - python=3.10
  - numpy
  - pandas
  - scipy
  - skrub
  - scikit-learn        # includes ElasticNet, HistGradientBoostingRegressor, RepeatedKFold, etc.
  - prince
  - miceforest
  - hoggorm
  - matplotlib
  - seaborn
  - jupyterlab
  - ipykernel
  - catboost            # CatBoostRegressor
  - lightgbm
  - shap
  - phik
  - pyod
  - optuna              # hyperparameter tuning (nested CV, phase 4)
  - pip
  - pip:
      - scikit-na
      - hoggormplot
      - adjustText
      - six
      - git+https://github.com/khliland/missing-methods.git  # NIPALS PCA/PLS/RV2 with NaN support

  # last updated 23.02.2026
